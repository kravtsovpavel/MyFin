<!DOCTYPE html>

<body>
    <!-- Экран входа -->
    <div id="login-screen" class="login-screen">
        <div class="login-content">
            <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px;">
                <svg viewBox="0 0 120 100" width="60" height="50">
                    <defs>
                        <linearGradient id="loginGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#1E88E5"/>
                            <stop offset="100%" style="stop-color:#0D47A1"/>
                        </linearGradient>
                    </defs>
                    <rect width="120" height="100" rx="22" fill="url(#loginGrad)"/>
                    <text x="60" y="44" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#FFC107" text-anchor="middle">My</text>
                    <text x="60" y="74" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Fin</text>
                </svg>
                <h1 class="login-title">MyFin</h1>
            </div>
            <p class="login-subtitle">Личный финансовый трекер</p>
            <button id="google-login-btn" class="google-login-btn">
                <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">

                        <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#1E88E5"/>
                            <stop offset="100%" style="stop-color:#0D47A1"/>
                        </linearGradient>
                    </defs>
                    <rect width="120" height="100" rx="22" fill="url(#brandGrad)"/>
                    <text x="60" y="44" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#FFC107" text-anchor="middle">My</text>
                    <text x="60" y="74" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Fin</text>

            <div class="nav-links">

                <a href="#/calendar" class="nav-link" data-page="calendar">Календарь</a>

                <a href="#/settings" class="nav-link" data-page="settings">Настройки</a>
            </div>
            <div class="nav-user">
                <span id="user-email"></span>
                <button id="logout-btn" class="logout-btn">Выйти</button>
            </div>
        </nav>

        <!-- Основной контент -->

        <!-- Нижняя навигация (mobile) -->

            <a href="#/dashboard" class="bottom-nav-item" data-page="dashboard">

                    <path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>

                    <path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                </svg>

            </a>
            <a href="#/calendar" class="bottom-nav-item" data-page="calendar">

                    <path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
